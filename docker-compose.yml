services:
  postgres:
    image: postgres:16-alpine
    container_name: project-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-priceyless}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-priceyless}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-priceyless}?schema=public
    container_name: project-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-priceyless}?schema=public
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-123}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "${API_PORT:-3001}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    command: sh -c "pnpm prisma migrate deploy && node dist/main.js"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: project-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: /api
    ports:
      - "${WEB_PORT:-3002}:3000"
    depends_on:
      - api
    networks:
      - app_network

  nginx:
    image: nginx:1.27-alpine
    container_name: project-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge